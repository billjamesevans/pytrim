name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,security]"
      - run: python -m pytest
      - run: python -m ruff check .
      - run: python -m mypy src/pytrim tests
      - run: python -m bandit -r src examples -q
      - run: detect-secrets scan --all-files --exclude-files '(^\.git/|^\.venv/|^dist/|^build/|^\.mypy_cache/|^\.pytest_cache/|^\.ruff_cache/|\.egg-info/|__pycache__/|\.pyc$)'
      - run: python -m pip_audit
      - run: python -m build
      - run: python -m twine check dist/*
